name: CI

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to validate; defaults to the triggering ref.
        required: false
        type: string
        default: ""
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ inputs.ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: 1

jobs:
  required-ci:
    name: Required CI
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Check repository presentation
        run: python scripts/check-repository.py

      - name: Review dependency changes (advisory)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          warn-only: true
          show-openssf-scorecard: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          prefix-key: v1-wuther-core
          shared-key: required-ci
          workspaces: |
            . -> target
          cache-bin: false
          cache-on-failure: true
          save-if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --all-targets --locked

      - name: Check CLI brand
        run: |
          cargo run --quiet -p wuther-core -- --help > /tmp/wuthercore-help.txt
          grep -q '^Usage: wuther-core' /tmp/wuthercore-help.txt

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build Rust documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
