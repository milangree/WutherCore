name: 功能建议
description: 提议新的能力、协议、平台支持或维护改进。
title: "[Feature]: "
labels:
  - enhancement
  - needs triage
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述具体使用场景和目前的限制，不要只填写功能名称。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明期望行为、配置或 API 形态，以及为什么适合放在内核中。
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 配置与迁移
        - 入站与协议
        - DNS
        - 路由与规则集
        - TUN / 透明代理
        - API 与可观测性
        - 构建与平台支持
        - 文档与开发体验
        - 其他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 包括可以在 GUI、脚本或外部工具中实现的方案。

  - type: textarea
    id: compatibility
    attributes:
      label: 兼容性与风险
      description: 是否需要修改配置、存储、网络权限或公开 API？

  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue 和 Discussion。
          required: true
        - label: 我愿意补充设计信息，并在可能的情况下参与实现或测试。
        - label: 我同意遵守项目行为准则。
          required: true
