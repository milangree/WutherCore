# ============================================================================
# WutherCore 构建提速配置（针对 LLVM 后端 + 默认链接器的痛点）
# ============================================================================
# 解决的实际问题：
#  * Windows: link.exe 单线程链接 + .pdb 大文件 → 切到 rust-lld 多线程链接
#  * Linux:   bfd-ld 单线程 + 重 relocation → 切到 mold（需 host 上有 mold）
#  * 网络:    crates.io 稀疏索引 (sparse) 在 Cargo 1.68+ 默认开启
#  * 并发:    rustc 内部 codegen-units 由 Cargo.toml 控制（已配 256/16）
# ============================================================================

# --- Windows MSVC：用 rust-lld 替代 link.exe ---
[target.x86_64-pc-windows-msvc]
# rust-lld 来自 stable rustc 工具链 (path/to/rustc-sysroot/lib/rustlib/x86_64-pc-windows-msvc/bin/rust-lld.exe)
# 使用 linker-flavor=lld-link 让 cargo 知道走 LLD-style flags。
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=/DEBUG:NONE",
    # 让 LLD 多线程并发链接（默认全核）
    "-C", "link-arg=/OPT:REF",
]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# --- Linux x86_64：mold > lld > bfd ---
[target.x86_64-unknown-linux-gnu]
# 优先 mold（最快），不存在时由用户改为 lld 或注释掉
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# --- macOS：用 ld64.lld（rustc 1.95+ 默认已启用） ---
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[net]
# 用 git CLI 抓取 git deps，避免 libgit2 在 Windows 大仓上的卡顿
git-fetch-with-cli = true

# CARGO_INCREMENTAL=1 已是默认；保留显式开关供 CI 关闭。
[build]
# 不固定 jobs，让 cargo 默认全核
incremental = true
